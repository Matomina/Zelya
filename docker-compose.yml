services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: zelya_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zelya}
      POSTGRES_USER: ${POSTGRES_USER:-zelya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-zelya}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (sessions / cache) ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zelya_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API (NestJS) ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: zelya_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-zelya}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zelya}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - '3001:3001'
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  # ─── Web (React + Vite) ───────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: zelya_web
    restart: unless-stopped
    depends_on:
      - api
    env_file: .env
    ports:
      - '5173:5173'
    volumes:
      - ./apps/web:/app
      - /app/node_modules

  # ─── Admin (React + Vite — accès restreint) ───────────────────────────────
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: zelya_admin
    restart: unless-stopped
    depends_on:
      - api
    env_file: .env
    ports:
      - '5174:5174'
    volumes:
      - ./apps/admin:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
